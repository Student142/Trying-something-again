<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Kim</title>
    <link rel="stylesheet" href="flowers.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* =============================================
           MESSAGE SCREEN
        ============================================= */
        #message-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 2s ease-out;
        }

        #message-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .message-container {
            color: #fff;
            font-size: clamp(1.2rem, 4vw, 2rem);
            text-align: center;
            padding: 2rem 2rem 0;
            max-width: 90%;
            line-height: 2.2;
        }

        .message-word {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            margin: 0 0.3em;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
            animation: wordFadeIn 0.6s ease-out forwards;
        }

        @keyframes wordFadeIn {
            0%  { opacity: 0; transform: translateY(20px); filter: blur(4px); }
            100%{ opacity: 1; transform: translateY(0);    filter: blur(0); }
        }

        /* tap hint — small, sits at bottom, no overlay */
        #tap-hint {
            margin-top: 2.5rem;
            color: rgba(255,255,255,0.55);
            font-size: clamp(0.75rem, 2vw, 1rem);
            letter-spacing: 0.08em;
            animation: pulse 2s ease-in-out infinite;
            cursor: pointer;
            user-select: none;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 999px;
            backdrop-filter: blur(4px);
        }

        @keyframes pulse {
            0%,100%{ opacity: 0.5; transform: scale(1); }
            50%    { opacity: 1;   transform: scale(1.04); }
        }

        /* =============================================
           MAIN SCENE
        ============================================= */
        #scene {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom,
                #0a0a14 0%,
                #141428 20%,
                #1a1a3e 40%,
                #0f0820 100%);
            opacity: 0;
            transition: opacity 2s ease-in;
            overflow: hidden;
        }

        #scene.visible { opacity: 1; }

        /* =============================================
           STARS
        ============================================= */
        .stars-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 65%;
            overflow: hidden;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        .star.bright {
            box-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4);
        }

        @keyframes twinkle {
            0%,100%{ opacity: 0.2; transform: scale(1); }
            50%    { opacity: 1;   transform: scale(1.3); }
        }

        /* =============================================
           MOON
        ============================================= */
        .moon-container {
            position: absolute;
            top: 5%; right: 12%;
            width: 120px; height: 120px;
            z-index: 2;
        }

        .moon {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%,
                #fffef0 0%, #fff8dc 30%, #f5f5dc 60%, #e8e4c9 100%);
            box-shadow:
                0 0 60px rgba(255,248,220,0.7),
                0 0 100px rgba(255,248,220,0.4),
                0 0 160px rgba(255,248,220,0.2);
            animation: moonPulse 5s ease-in-out infinite;
        }

        .moon-crater {
            position: absolute;
            background: rgba(160,160,140,0.15);
            border-radius: 50%;
        }
        .crater-1 { top:40%; left:20%; width:8%;  height:8%;  }
        .crater-2 { top:70%; left:40%; width:6%;  height:6%;  }
        .crater-3 { top:30%; left:70%; width:10%; height:10%; }

        @keyframes moonPulse {
            0%,100%{ box-shadow: 0 0 60px rgba(255,248,220,0.7), 0 0 100px rgba(255,248,220,0.4); transform: scale(1); }
            50%    { box-shadow: 0 0 80px rgba(255,248,220,0.9), 0 0 130px rgba(255,248,220,0.6); transform: scale(1.02); }
        }

        /* =============================================
           MOUNTAINS (behind flowers)
        ============================================= */
        .mountains-container {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 50%;
            z-index: 3;
            pointer-events: none;
        }

        .mountain {
            position: absolute;
            bottom: 0;
        }

        .mountain-1 {
            left: -5%; width: 50%; height: 70%;
            background: linear-gradient(135deg, #100820 0%, #1e1035 100%);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }
        .mountain-2 {
            left: 30%; width: 45%; height: 90%;
            background: linear-gradient(135deg, #0d0618 0%, #190d2e 100%);
            clip-path: polygon(40% 0%, 100% 100%, 0% 100%);
        }
        .mountain-3 {
            right: -5%; width: 55%; height: 65%;
            background: linear-gradient(135deg, #100820 0%, #1e1035 100%);
            clip-path: polygon(60% 0%, 100% 100%, 0% 100%);
        }
        .mountain-4 {
            left: 10%; width: 35%; height: 50%;
            background: linear-gradient(135deg, #080415 0%, #110820 100%);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            opacity: 0.7;
        }
        .mountain-5 {
            right: 15%; width: 40%; height: 45%;
            background: linear-gradient(135deg, #080415 0%, #110820 100%);
            clip-path: polygon(45% 0%, 100% 100%, 0% 100%);
            opacity: 0.75;
        }

        /* =============================================
           FLOWER SCENE WRAPPER
           Sits at the bottom, above mountains
        ============================================= */
        #flower-scene {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            /* Override flowers.css body styles so they apply to the wrapper */
            display: flex;
            align-items: flex-end;
            justify-content: center;
            perspective: 1000px;
            padding-bottom: 30px;
        }

        /* Particles */
        .particles-container {
            position: absolute;
            bottom: 5%; left: 50%;
            transform: translateX(-50%);
            width: 500px; height: 400px;
            pointer-events: none;
            z-index: 20;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        .particle-gold  { width:4px;height:4px; background:radial-gradient(circle,#ffd700 0%,transparent 70%); box-shadow:0 0 8px rgba(255,215,0,0.8); }
        .particle-pink  { width:3px;height:3px; background:radial-gradient(circle,#ffb6c1 0%,transparent 70%); box-shadow:0 0 6px rgba(255,182,193,0.8); }
        .particle-white { width:2px;height:2px; background:radial-gradient(circle,#fff 0%,transparent 70%);    box-shadow:0 0 5px rgba(255,255,255,0.8); }

        @keyframes floatParticle {
            0%  { opacity:0; transform:translateY(0) translateX(0) scale(0); }
            10% { opacity:1; transform:translateY(-30px) translateX(var(--tx)) scale(1); }
            90% { opacity:0.8; transform:translateY(-180px) translateX(var(--tx2)) scale(0.8); }
            100%{ opacity:0; transform:translateY(-230px) translateX(var(--tx2)) scale(0); }
        }

        /* =============================================
           MUSIC TOGGLE
        ============================================= */
        #music-toggle {
            position: fixed;
            top: 20px; right: 20px;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        #music-toggle:hover { background:rgba(255,255,255,0.2); transform:scale(1.1); }
        #music-toggle svg  { width:22px; height:22px; fill:white; }
        #music-toggle.muted svg { opacity:0.4; }

        /* =============================================
           RESPONSIVE
        ============================================= */
        @media (max-width: 768px) {
            .moon-container { width:80px; height:80px; right:6%; }
        }
    </style>
</head>

    <script>
        // =============================================
        // WEB AUDIO — ROMANTIC MUSIC
        // =============================================
        let audioContext = null, isPlaying = false, isMuted = false;
        let oscillators = [], gainNodes = [], musicLoopId = null, chordIndex = 0;

        const notes = {
            C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00,
            C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
            C5:523.25, E5:659.25, G5:783.99
        };

        const chords = [
            [notes.C4, notes.E4, notes.G4],
            [notes.A3, notes.C4, notes.E4],
            [notes.F3, notes.A3, notes.C4],
            [notes.G3, notes.D4, notes.G4],
            [notes.E3, notes.G3, notes.C4],
            [notes.D3, notes.F3, notes.A3],
        ];

        function initAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function createOscillator(frequency, type = 'sine') {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = type;
            osc.frequency.value = frequency;
            osc.detune.value = (Math.random() - 0.5) * 8;
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start();
            return { osc, gain };
        }

        function playChord(chord, duration, startTime) {
            chord.forEach((freq, i) => {
                const { osc, gain } = createOscillator(freq, 'triangle');
                const nd = i * 0.1;
                gain.gain.setValueAtTime(0, startTime + nd);
                gain.gain.linearRampToValueAtTime(0.07, startTime + nd + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.02, startTime + duration - 0.5);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                oscillators.push(osc); gainNodes.push(gain);
                setTimeout(() => { try { osc.stop(); osc.disconnect(); gain.disconnect(); } catch(e){} },
                    (duration + startTime - audioContext.currentTime) * 1000 + 500);
            });
        }

        function playArpeggio(startTime) {
            [notes.C5, notes.E5, notes.G5, notes.C5, notes.G4, notes.E4].forEach((freq, i) => {
                const { osc, gain } = createOscillator(freq, 'sine');
                const t = startTime + i * 0.28;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.04, t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                gain.gain.linearRampToValueAtTime(0, t + 0.5);
                oscillators.push(osc); gainNodes.push(gain);
                setTimeout(() => { try { osc.stop(); osc.disconnect(); gain.disconnect(); } catch(e){} },
                    (t - audioContext.currentTime + 0.6) * 1000);
            });
        }

        function playBass(freq, duration, startTime) {
            const { osc, gain } = createOscillator(freq, 'sine');
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.09, startTime + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.04, startTime + duration - 0.5);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);
            oscillators.push(osc); gainNodes.push(gain);
            setTimeout(() => { try { osc.stop(); osc.disconnect(); gain.disconnect(); } catch(e){} },
                (duration + startTime - audioContext.currentTime) * 1000 + 500);
        }

        function startMusic() {
            if (isPlaying) return;
            initAudio(); isPlaying = true;
            const bassNotes = [notes.C3, notes.A3, notes.F3, notes.G3, notes.E3, notes.D3];
            function loop() {
                if (!isPlaying || isMuted) return;
                const now = audioContext.currentTime;
                playBass(bassNotes[chordIndex], 3, now);
                playChord(chords[chordIndex], 3.5, now + 0.2);
                if (chordIndex % 2 === 0) playArpeggio(now + 2);
                chordIndex = (chordIndex + 1) % chords.length;
                musicLoopId = setTimeout(loop, 4000);
            }
            loop();
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('music-toggle');
            const icon = document.getElementById('sound-icon');
            if (isMuted) {
                btn.classList.add('muted');
                icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
                gainNodes.forEach(g => { try { g.gain.setTargetAtTime(0, audioContext.currentTime, 0.1); } catch(e){} });
            } else {
                btn.classList.remove('muted');
                icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
                if (!musicLoopId) startMusic();
            }
        }

        // =============================================
        // MESSAGE ANIMATION
        // =============================================
        function animateMessage() {
            const container = document.getElementById('message-container');
            const message = "hi kim amo ini an surprice ko kanina if mag gana dapat may flower na magpakita";
            const words = message.split(' ');
            words.forEach((word, i) => {
                const span = document.createElement('span');
                span.className = 'message-word';
                span.textContent = word;
                span.style.animationDelay = `${i * 0.4}s`;
                container.appendChild(span);
            });
            const fadeDelay = (words.length * 0.4 + 1.6) * 1000;
            setTimeout(() => {
                document.getElementById('message-screen').classList.add('fade-out');
            }, fadeDelay);
        }

        // =============================================
        // GENERATE STARS
        // =============================================
        function generateStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star' + (Math.random() < 0.1 ? ' bright' : '');
                const size = Math.random() * 2.5 + 0.5;
                star.style.cssText = `
                    left:${Math.random()*100}%;
                    top:${Math.random()*100}%;
                    width:${size}px;height:${size}px;
                    --duration:${Math.random()*3+2}s;
                    --delay:${Math.random()*5}s;
                `;
                container.appendChild(star);
            }
        }

        // =============================================
        // GENERATE PARTICLES
        // =============================================
        function generateParticles() {
            const container = document.getElementById('particles');
            const types = ['particle-gold','particle-pink','particle-white'];
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = `particle ${types[Math.floor(Math.random()*3)]}`;
                const tx = (Math.random()-0.5)*80;
                p.style.cssText = `
                    left:${20+Math.random()*60}%;
                    bottom:${10+Math.random()*40}%;
                    --tx:${tx}px;
                    --tx2:${tx+(Math.random()-0.5)*40}px;
                    --duration:${5+Math.random()*5}s;
                    --delay:${Math.random()*8}s;
                `;
                container.appendChild(p);
            }
        }

        // =============================================
        // START EXPERIENCE ON TAP
        // =============================================
        function startExperience() {
            document.getElementById('scene').classList.add('visible');
            startMusic();
            // un-pause flower CSS animations
            document.body.classList.remove('not-loaded');
        }

        // =============================================
        // INIT
        // =============================================
        window.addEventListener('DOMContentLoaded', () => {
            animateMessage();
            generateStars();
            generateParticles();

            // tap anywhere (including the hint) to start
            document.getElementById('message-screen').addEventListener('click', startExperience, { once: true });
            document.getElementById('tap-hint').addEventListener('click', startExperience, { once: true });
        });

        document.getElementById('music-toggle').addEventListener('click', e => {
            e.stopPropagation();
            toggleMute();
        });
    </script>
</body>
</html>
